name: Update TV Schedules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          path: tv-schedule-rss

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run generator
        run: |
          cd tv-schedule-rss
          python generate.py

      - name: Debug file tree
        run: |
          cd tv-schedule-rss
          echo "=== File tree ==="
          ls -R .

      - name: Commit and push
        run: |
          cd tv-schedule-rss
          git config user.name "TvSchedule"
          git config user.email "example@example.com"
          git add rss
          git commit -m "Update schedules" || echo "No changes"
          git push || true
